# =============================================================================
# NHÓM 2: Backend Độc lập - emailservice
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: emailservice-online-boutique
  namespace: {{ include "online-boutique.namespace" . }}
  labels:
    app: emailservice-online-boutique
    group: "2-backend-independent"
spec:
  selector:
    matchLabels:
      app: emailservice-online-boutique
  template:
    metadata:
      labels:
        app: emailservice-online-boutique
    spec:
      serviceAccountName: emailservice-online-boutique
      terminationGracePeriodSeconds: 5
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      imagePullSecrets:
        {{- range .Values.imagePullSecrets }}
        - name: {{ .name }}
        {{- end }}
      containers:
      - name: server
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
        image: "{{ .Values.emailservice.image.repository }}:{{ .Values.emailservice.image.tag }}"
        imagePullPolicy: {{ .Values.emailservice.image.pullPolicy }}
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: DISABLE_PROFILER
          value: "1"
        readinessProbe:
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          grpc:
            port: 8080
        livenessProbe:
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          grpc:
            port: 8080
        resources:
          requests:
            cpu: {{ .Values.emailservice.resources.requests.cpu }}
            memory: {{ .Values.emailservice.resources.requests.memory }}
          limits:
            cpu: {{ .Values.emailservice.resources.limits.cpu }}
            memory: {{ .Values.emailservice.resources.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: emailservice-online-boutique
  namespace: {{ include "online-boutique.namespace" . }}
  labels:
    app: emailservice-online-boutique
spec:
  type: ClusterIP
  selector:
    app: emailservice-online-boutique
  ports:
  - name: grpc
    port: 5000
    targetPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: emailservice-online-boutique
  namespace: {{ include "online-boutique.namespace" . }}
