# =============================================================================
# NHÓM 2: Backend Độc lập - paymentservice
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymentservice-online-boutique
  namespace: {{ include "online-boutique.namespace" . }}
  labels:
    app: paymentservice-online-boutique
    group: "2-backend-independent"
spec:
  selector:
    matchLabels:
      app: paymentservice-online-boutique
  template:
    metadata:
      labels:
        app: paymentservice-online-boutique
    spec:
      serviceAccountName: paymentservice-online-boutique
      terminationGracePeriodSeconds: 5
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      imagePullSecrets:
        {{- range .Values.imagePullSecrets }}
        - name: {{ .name }}
        {{- end }}
      containers:
      - name: server
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          privileged: false
          readOnlyRootFilesystem: true
        image: "{{ .Values.paymentservice.image.repository }}:{{ .Values.paymentservice.image.tag }}"
        imagePullPolicy: {{ .Values.paymentservice.image.pullPolicy }}
        ports:
        - containerPort: 50051
        env:
        - name: PORT
          value: "50051"
        - name: DISABLE_PROFILER
          value: "1"
        readinessProbe:
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          grpc:
            port: 50051
        livenessProbe:
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          grpc:
            port: 50051
        resources:
          requests:
            cpu: {{ .Values.paymentservice.resources.requests.cpu }}
            memory: {{ .Values.paymentservice.resources.requests.memory }}
          limits:
            cpu: {{ .Values.paymentservice.resources.limits.cpu }}
            memory: {{ .Values.paymentservice.resources.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: paymentservice-online-boutique
  namespace: {{ include "online-boutique.namespace" . }}
  labels:
    app: paymentservice-online-boutique
spec:
  type: ClusterIP
  selector:
    app: paymentservice-online-boutique
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: paymentservice-online-boutique
  namespace: {{ include "online-boutique.namespace" . }}
